
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.header{padding:2rem 0 1.5rem;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.5rem}
.header h1{font-size:22px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px}
.header p{font-size:14px;color:var(--color-text-secondary)}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem;align-items:center}
.filter-label{font-size:13px;color:var(--color-text-secondary);margin-right:4px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;font-size:13px;cursor:pointer;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-secondary);transition:all 0.15s}
.tag:hover{border-color:var(--color-border-secondary);color:var(--color-text-primary)}
.tag.active{background:#EEEDFE;border-color:#AFA9EC;color:#3C3489}
.search-bar{margin-bottom:1.5rem;position:relative}
.search-bar input{width:100%;padding:8px 12px 8px 36px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary)}
.search-bar .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--color-text-secondary);font-size:16px}
.stats{font-size:13px;color:var(--color-text-secondary);margin-bottom:1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem;display:flex;flex-direction:column;gap:8px;transition:border-color 0.15s}
.card:hover{border-color:var(--color-border-secondary)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-origin{font-size:11px;padding:2px 7px;border-radius:10px;font-weight:500}
.cn{background:#EAF3DE;color:#3B6D11}
.intl{background:#E6F1FB;color:#185FA5}
.card-name{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.card-desc{font-size:13px;color:var(--color-text-secondary);line-height:1.5;flex:1}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.cat-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:400}
.card-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#534AB7;text-decoration:none;padding:4px 10px;border-radius:var(--border-radius-md);border:0.5px solid #AFA9EC;transition:background 0.15s}
.card-link:hover{background:#EEEDFE}
.empty{text-align:center;padding:3rem;color:var(--color-text-secondary);font-size:14px;grid-column:1/-1}
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">AI智能体导航目录，包含国内外主流AI产品，支持分类筛选</h2>

<div class="header">
  <h1><i class="ti ti-brain" aria-hidden="true" style="font-size:20px;margin-right:8px;color:#534AB7"></i>AI 智能体导航</h1>
  <p>收录国内外主流 AI 智能体产品，点击访问官网</p>
</div>

<div class="search-bar">
  <i class="ti ti-search si" aria-hidden="true"></i>
  <input type="text" id="searchInput" placeholder="搜索 AI 产品名称或功能…" oninput="renderCards()">
</div>

<div class="filters" id="filters" role="group" aria-label="分类筛选"></div>

<p class="stats" id="stats"></p>

<div class="grid" id="grid" role="list"></div>

<script>
const agents=[
  {name:"ChatGPT",origin:"intl",cat:"通用对话",icon:"🤖",desc:"OpenAI 旗舰对话模型，支持多轮对话、代码、图像生成等多种能力",url:"https://chat.openai.com"},
  {name:"Claude",origin:"intl",cat:"通用对话",icon:"🧡",desc:"Anthropic 出品，以安全性与长文本处理见长，支持 100K+ token 上下文",url:"https://claude.ai"},
  {name:"Gemini",origin:"intl",cat:"通用对话",icon:"♊",desc:"Google DeepMind 多模态大模型，深度整合 Google 搜索与 Workspace",url:"https://gemini.google.com"},
  {name:"Copilot",origin:"intl",cat:"办公助手",icon:"🪟",desc:"Microsoft 基于 GPT-4 打造，深度融入 Office 365 全套办公场景",url:"https://copilot.microsoft.com"},
  {name:"Perplexity AI",origin:"intl",cat:"搜索问答",icon:"🔍",desc:"AI 驱动的搜索引擎，实时联网检索并给出带引用来源的精准答案",url:"https://www.perplexity.ai"},
  {name:"Cursor",origin:"intl",cat:"代码开发",icon:"💻",desc:"AI-first 代码编辑器，内置多模型支持，可与整个代码库对话",url:"https://www.cursor.com"},
  {name:"GitHub Copilot",origin:"intl",cat:"代码开发",icon:"🐙",desc:"GitHub 官方 AI 编程助手，支持代码补全、PR 审查与自动修复",url:"https://github.com/features/copilot"},
  {name:"Midjourney",origin:"intl",cat:"图像生成",icon:"🎨",desc:"顶级 AI 图像生成工具，以高艺术质感和细腻风格著称",url:"https://www.midjourney.com"},
  {name:"Sora",origin:"intl",cat:"视频生成",icon:"🎬",desc:"OpenAI 文生视频模型，可生成长达 60 秒的高质量视频",url:"https://sora.com"},
  {name:"ElevenLabs",origin:"intl",cat:"语音合成",icon:"🎙️",desc:"业界领先的 AI 语音克隆与合成平台，支持多语言情感语音",url:"https://elevenlabs.io"},
  {name:"Runway",origin:"intl",cat:"视频生成",icon:"🎞️",desc:"创意人士首选的 AI 视频生成与编辑工具，支持 Gen-3 模型",url:"https://runwayml.com"},
  {name:"Notion AI",origin:"intl",cat:"办公助手",icon:"📝",desc:"Notion 内置 AI 助手，一键生成摘要、翻译、改写和数据库填充",url:"https://www.notion.so/product/ai"},
  {name:"文心一言",origin:"cn",cat:"通用对话",icon:"🌊",desc:"百度自研大语言模型，支持中文创作、搜索增强、多模态生成",url:"https://yiyan.baidu.com"},
  {name:"通义千问",origin:"cn",cat:"通用对话",icon:"🔮",desc:"阿里巴巴达摩院大模型，强于长文档理解与企业级应用集成",url:"https://tongyi.aliyun.com"},
  {name:"讯飞星火",origin:"cn",cat:"通用对话",icon:"✨",desc:"科大讯飞出品，在中文语音交互与教育场景中表现突出",url:"https://xinghuo.xfyun.cn"},
  {name:"豆包",origin:"cn",cat:"通用对话",icon:"🫘",desc:"字节跳动推出的 AI 助手，集对话、搜索、创作于一体",url:"https://www.doubao.com"},
  {name:"Kimi",origin:"cn",cat:"通用对话",icon:"🌙",desc:"月之暗面出品，以超长上下文（200K token）处理长文档见长",url:"https://kimi.moonshot.cn"},
  {name:"DeepSeek",origin:"cn",cat:"通用对话",icon:"🔵",desc:"深度求索旗舰模型，开源且性能卓越，推理能力受到广泛认可",url:"https://chat.deepseek.com"},
  {name:"混元助手",origin:"cn",cat:"通用对话",icon:"☁️",desc:"腾讯混元大模型驱动，深度融合微信生态与企业微信办公场景",url:"https://hunyuan.tencent.com"},
  {name:"智谱清言",origin:"cn",cat:"通用对话",icon:"🧩",desc:"清华系 GLM 大模型，支持代码生成、学术写作与多模态理解",url:"https://chatglm.cn"},
  {name:"秘塔AI搜索",origin:"cn",cat:"搜索问答",icon:"🗂️",desc:"国内领先的 AI 搜索引擎，无广告、带引用，结构化呈现答案",url:"https://metaso.cn"},
  {name:"天工AI",origin:"cn",cat:"搜索问答",icon:"🔧",desc:"昆仑万维推出的 AI 搜索助手，支持联网实时检索与多轮追问",url:"https://www.tiangong.cn"},
  {name:"即梦AI",origin:"cn",cat:"图像生成",icon:"🖼️",desc:"字节跳动旗下 AI 图像与视频生成平台，支持文生图与图生视频",url:"https://jimeng.jianying.com"},
  {name:"通义万相",origin:"cn",cat:"图像生成",icon:"🌸",desc:"阿里巴巴 AI 创意图像平台，支持文生图、风格迁移与商业设计",url:"https://tongyi.aliyun.com/wanxiang"},
  {name:"可灵AI",origin:"cn",cat:"视频生成",icon:"🎥",desc:"快手推出的 AI 视频生成大模型，支持高质量文生视频与图生视频",url:"https://klingai.kuaishou.com"},
  {name:"海螺AI",origin:"cn",cat:"语音合成",icon:"🐚",desc:"MiniMax 旗下语音平台，具备高拟真语音合成与克隆能力",url:"https://hailuoai.com"},
  {name:"Coze",origin:"cn",cat:"智能体平台",icon:"🤝",desc:"字节跳动推出的 AI Bot 搭建平台，无需代码即可创建智能体",url:"https://www.coze.cn"},
  {name:"扣子",origin:"cn",cat:"智能体平台",icon:"🔗",desc:"Coze 国内版，支持插件编排、知识库接入与多平台发布",url:"https://www.coze.cn"},
  {name:"Dify",origin:"cn",cat:"智能体平台",icon:"⚙️",desc:"开源 LLM 应用开发平台，支持 RAG、Agent 与 Workflow 编排",url:"https://dify.ai"},
  {name:"AutoGPT",origin:"intl",cat:"智能体平台",icon:"🤖",desc:"开源自主 AI 智能体框架，能自主分解任务并执行多步骤计划",url:"https://agpt.co"},
  {name:"Jasper AI",origin:"intl",cat:"内容创作",icon:"✍️",desc:"企业级 AI 营销写作平台，支持广告文案、博客与社媒内容生成",url:"https://www.jasper.ai"},
  {name:"Copy.ai",origin:"intl",cat:"内容创作",icon:"📋",desc:"AI 驱动的营销内容生成工具，覆盖邮件、广告语与产品描述",url:"https://www.copy.ai"},
  {name:"稿定AI",origin:"cn",cat:"内容创作",icon:"🖊️",desc:"国内设计平台集成 AI 能力，支持文案生成、图片编辑与视频剪辑",url:"https://www.gaoding.com"},
  {name:"WPS AI",origin:"cn",cat:"办公助手",icon:"📄",desc:"金山办公旗下 AI 助手，深度集成 WPS 文档、表格与演示场景",url:"https://ai.wps.cn"},
];

const cats=["全部",...[...new Set(agents.map(a=>a.cat))]];
const catColors={
  "通用对话":["#EEEDFE","#3C3489"],
  "搜索问答":["#E6F1FB","#185FA5"],
  "代码开发":["#EAF3DE","#27500A"],
  "图像生成":["#FBEAF0","#72243E"],
  "视频生成":["#FAECE7","#712B13"],
  "语音合成":["#FAEEDA","#633806"],
  "办公助手":["#E1F5EE","#085041"],
  "智能体平台":["#F1EFE8","#444441"],
  "内容创作":["#FCEBEB","#791F1F"],
};

let activeCat="全部";

function renderFilters(){
  const f=document.getElementById("filters");
  f.innerHTML='<span class="filter-label">分类：</span>';
  cats.forEach(c=>{
    const b=document.createElement("button");
    b.className="tag"+(c===activeCat?" active":"");
    b.textContent=c;
    b.setAttribute("aria-pressed",c===activeCat);
    b.onclick=()=>{activeCat=c;renderFilters();renderCards()};
    f.appendChild(b);
  });
}

function renderCards(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const filtered=agents.filter(a=>{
    const catOk=activeCat==="全部"||a.cat===activeCat;
    const searchOk=!q||a.name.toLowerCase().includes(q)||a.desc.toLowerCase().includes(q)||a.cat.toLowerCase().includes(q);
    return catOk&&searchOk;
  });
  document.getElementById("stats").textContent=`共找到 ${filtered.length} 个 AI 产品`;
  const g=document.getElementById("grid");
  if(filtered.length===0){
    g.innerHTML='<div class="empty"><i class="ti ti-mood-empty" style="font-size:32px;display:block;margin-bottom:8px"></i>没有找到匹配的 AI 产品</div>';
    return;
  }
  g.innerHTML=filtered.map(a=>{
    const [bg,tc]=catColors[a.cat]||["#F1EFE8","#444441"];
    return `<div class="card" role="listitem">
      <div class="card-top">
        <div class="card-icon" style="background:${bg};font-size:20px">${a.icon}</div>
        <span class="card-origin ${a.origin}">${a.origin==="cn"?"🇨🇳 国内":"🌍 国际"}</span>
      </div>
      <div class="card-name">${a.name}</div>
      <div class="card-desc">${a.desc}</div>
      <div class="card-footer">
        <span class="cat-badge" style="background:${bg};color:${tc}">${a.cat}</span>
        <a class="card-link" href="${a.url}" target="_blank" rel="noopener noreferrer" aria-label="访问 ${a.name} 官网">
          访问官网 <i class="ti ti-external-link" aria-hidden="true" style="font-size:13px"></i>
        </a>
      </div>
    </div>`;
  }).join("");
}

renderFilters();
renderCards();
</script>
